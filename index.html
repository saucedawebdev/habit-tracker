<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Habit Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
          <h1>Habit Tracker</h1>
          <div class="card-content">
            <div id="counter">0</div>
            <button id="completBtn">Complete Today</button>
            <button id="resetBtn">Reset</button>
            <p id="specialMessage"></p>
            <section class="badges" aria-label="Achievements">
              <h2 class="badge-title">Achievements</h2>
              <div id="badgeList" class="badge-list"></div>
              <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <p class="progress-label" id="progressLabel">0%</p>
              </div>
          </section>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
